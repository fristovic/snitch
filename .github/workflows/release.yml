name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@v6
        continue-on-error: true
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --fail-fast=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Homebrew tap publish failed
        if: steps.goreleaser.outcome == 'failure'
        run: |
          echo "::warning::GoReleaser exited with an error — often the Homebrew tap push."
          echo "::warning::GitHub release artifacts are usually still published. Check the log and HOMEBREW_TAP_TOKEN."
