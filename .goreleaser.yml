version: 2
project_name: snitch

before:
  hooks:
    - go mod tidy

builds:
  - id: snitchd
    main: ./cmd/snitchd
    binary: snitchd
    goos: [darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/fristovic/snitch/internal/version.Version={{.Version}}
  - id: snitch
    main: ./cmd/snitch
    binary: snitch
    goos: [darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/fristovic/snitch/internal/version.Version={{.Version}}
  - id: snitchbar
    main: ./cmd/snitchbar
    binary: snitchbar
    goos: [darwin]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w -X github.com/fristovic/snitch/internal/version.Version={{.Version}}
    hooks:
      post:
        - cmd: ./scripts/bundle-snitchbar.sh {{ .Path }} {{ .Version }}
          env:
            - SNITCHD_PATH={{ dir .Path }}/../snitchd_{{ .Target }}/snitchd

archives:
  - id: default
    ids: [snitchd, snitch, snitchbar]
    name_template: "snitch_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - scripts/bundle-snitchbar.sh
      - scripts/install.sh
      - install/macos/Snitch-Bar-Info.plist
      - install/macos/com.snitch.menubar.plist
      - src: "dist/snitchbar_{{ .Target }}/Snitch Bar.app/**"
        dst: "Snitch Bar.app"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: snitch
    repository:
      owner: fristovic
      name: homebrew-snitch
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/fristovic/snitch"
    description: "Deterministic prose claim verifier for AI coding agents (Cursor, Claude Code, Codex, Pi, OpenCode)"
    license: "MIT"
    install: |
      bin.install "snitch"
      bin.install "snitchd"
      if File.directory?("Snitch Bar.app")
        prefix.install "Snitch Bar.app"
      elsif File.directory?("Contents")
        (prefix/"Snitch Bar.app").install "Contents"
      else
        system buildpath/"scripts/bundle-snitchbar.sh", buildpath/"snitchbar", version, buildpath/"snitchd"
        prefix.install "Snitch Bar.app"
      end
      (share/"snitch").install "install/macos/com.snitch.menubar.plist"
    post_install: |
      home = Dir.home
      daemon_plist = File.join(home, "Library/LaunchAgents/com.snitch.daemon.plist")
      if File.exist?(daemon_plist)
        system "launchctl", "bootout", "gui/#{Process.uid}/com.snitch.daemon" rescue nil
        File.delete(daemon_plist)
      end
      app_path = File.join(opt_prefix, "Snitch Bar.app")
      contents = File.join(app_path, "Contents")
      unless File.directory?(File.join(contents, "MacOS"))
        %w[MacOS Resources Info.plist].each do |name|
          src = File.join(app_path, name)
          FileUtils.mkdir_p(contents)
          FileUtils.mv(src, File.join(contents, name)) if File.exist?(src)
        end
      end
      plist_src = File.join(share, "snitch", "com.snitch.menubar.plist")
      plist_dest = File.join(home, "Library/LaunchAgents/com.snitch.menubar.plist")
      if File.exist?(plist_src) && File.directory?(app_path)
        content = File.read(plist_src).gsub("__SNITCHBAR_APP__", app_path).gsub("__HOME__", home)
        FileUtils.mkdir_p(File.dirname(plist_dest))
        File.write(plist_dest, content)
        system "launchctl", "bootout", "gui/#{Process.uid}/com.snitch.menubar" rescue nil
        system "launchctl", "bootstrap", "gui/#{Process.uid}", plist_dest rescue system("launchctl", "load", plist_dest)
      end
    caveats: |
      Snitch Bar manages claim verification automatically.
      After install:
        snitch start
      Use Start Snitching / Stop Snitching in the menu bar to pause or resume.
      No brew services step — the menubar LaunchAgent opens Snitch Bar at login.
    skip_upload: '{{ not .Env.HOMEBREW_TAP_TOKEN }}'

release:
  github:
    owner: fristovic
    name: snitch
  extra_files:
    - glob: scripts/install.sh
