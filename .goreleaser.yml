version: 2
project_name: snitch

before:
  hooks:
    - go mod tidy

builds:
  - id: snitchd
    main: ./cmd/snitchd
    binary: snitchd
    goos: [darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/fristovic/snitch/internal/version.Version={{.Version}}
  - id: snitch
    main: ./cmd/snitch
    binary: snitch
    goos: [darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/fristovic/snitch/internal/version.Version={{.Version}}

archives:
  - id: default
    builds: [snitchd, snitch]
    name_template: "snitch_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  name_template: "{{ incpatch .Version }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: snitch
    repository:
      owner: fristovic
      name: homebrew-snitch
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/fristovic/snitch"
    description: "Catch Cursor agent lies in prose — local lie detector"
    license: "MIT"
    service: |
      run opt_bin/"snitchd"
      keep_alive true
      log_path "~/Library/Logs/snitch/snitchd.log"
      error_log_path "~/Library/Logs/snitch/snitchd.log"

release:
  github:
    owner: fristovic
    name: snitch
  extra_files:
    - glob: scripts/install.sh
